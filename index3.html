<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href=""> <!-- for going OUT to IN in folder of html we use ctrl+space and going IN to OUT we use ../  in href-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(62, 51, 33);
        }
        /* .btn1 {
            background-color: blue;
        } */

        

         .btn-grad {background-image: linear-gradient(to right, #403B4A 0%, #E7E9BB  51%, #403B4A  100%)}
         .btn-grad {
            margin: 10px;
            padding: 15px 45px;
            text-align: center;
            text-transform: uppercase;
            transition: 0.5s;
            background-size: 200% auto;
            color: white;            
            box-shadow: 0 0 20px #eee;
            border-radius: 10px;
            display: block;
          }

          .btn-grad:hover {
            background-position: right center; /* change the direction of the change here */
            color: #fff;
            text-decoration: none;
          }
         
         
    </style>
</head>
<body>
    <div>
        <form style="font-size: x-large; font-weight: 1000;">
            <label>Username</label>
            <input type="text" placeholder="enter your username"/>
            <br>
            <label>Password</label>
            <input type="password" placeholder="enter your password"/>
            <br>
            <button class= "btn-grad" id="btn" onclick="login(event)">Login</button>
        </form>
    </div>

    <list>
        <ol type="a">
        <li>apple</li>
        <li>cherry</li>
        <li>guava</li>
        </ol>
  
        <ul style="list-style-type: disc;">
        <li>apple</li>
        <li>cherry</li>
        <li>guava</li>
        </ul>
    </list>

    <p>&#x1F60E</p>
    <p>😄</p>
    <!-- hex address of anyemoji can also print and by emoji also -->
    <p>&copy : &#916 </p> <!-- &copy is used to symbolise copy right symbol -->
</body>
<script>
    function login(event) {
        event.preventDefault()

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const data = {username: username , password: password};
        console.log(data)
    }
</script>
</html>
